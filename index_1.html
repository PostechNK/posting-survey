<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ポスティング調査フォーム</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --accent: #00c8ff; --accent2: #7c3aed; --done: #00e5a0;
  --warn: #f59e0b; --err: #ff6b6b;
  --bg: #0d0d14; --card: #16161f; --card2: #1e1e2a;
  --border: #2c2c40; --text: #eaeaf2; --muted: #72728e;
}
html, body { width: 100%; min-height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Hiragino Sans', sans-serif; -webkit-font-smoothing: antialiased; }
input, textarea, select, button { font-size: 16px; }

.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* TOP */
#s-top { padding: 36px 20px 40px; padding-top: max(40px, env(safe-area-inset-top)); }
.top-logo { font-size: 11px; letter-spacing: 4px; color: var(--accent); font-weight: 700; margin-bottom: 28px; }
.top-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
.top-sub { font-size: 15px; color: var(--muted); margin-bottom: 28px; }
.top-btn { width: 100%; padding: 20px 18px; border-radius: 16px; font-size: 17px; font-weight: 700; border: none; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; text-align: left; }
.top-btn.new { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; }
.top-btn .btn-icon { font-size: 22px; flex-shrink: 0; }
.top-btn .btn-text { flex: 1; }
.top-btn .btn-text small { display: block; font-size: 13px; font-weight: 400; opacity: .75; margin-top: 2px; }
.section-label { font-size: 13px; color: var(--muted); font-weight: 700; letter-spacing: 1px; margin: 26px 0 10px; }
.draft-list { display: flex; flex-direction: column; gap: 8px; }
.draft-item { background: var(--card); border: 2px solid rgba(245,158,11,.4); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.draft-icon { font-size: 22px; flex-shrink: 0; }
.draft-info { flex: 1; min-width: 0; cursor: pointer; }
.draft-company { font-size: 16px; font-weight: 700; }
.draft-date { font-size: 13px; color: var(--muted); margin-top: 3px; }
.draft-delete { font-size: 20px; color: var(--muted); padding: 6px; background: none; border: none; flex-shrink: 0; }

/* 会社名 */
#s-company { padding: 36px 20px; padding-top: max(40px, env(safe-area-inset-top)); }
.back-btn { font-size: 15px; color: var(--muted); background: none; border: none; margin-bottom: 24px; display: flex; align-items: center; gap: 4px; }
.sc-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.sc-sub { font-size: 15px; color: var(--muted); margin-bottom: 22px; }
.sc-input { width: 100%; background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 16px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: block; }
.sc-input:focus { border-color: var(--accent); outline: none; }
.sc-btn { width: 100%; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 700; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; border: none; }

/* フォーム */
#s-form { background: var(--bg); flex-direction: column; }
.hdr { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 16px 8px; padding-top: max(10px, env(safe-area-inset-top)); flex-shrink: 0; }
.hdr-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
.hdr-company { font-size: 15px; font-weight: 700; color: var(--accent); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.prog-label { font-size: 13px; font-weight: 700; color: var(--muted); white-space: nowrap; }
.prog-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width .3s; }

.list-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.list { padding: 10px; padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }

/* カード */
.card { background: var(--card); border: 2px solid var(--border); border-radius: 14px; margin-bottom: 8px; overflow: hidden; }
.card.partial { border-color: rgba(245,158,11,.6); }
.card.done    { border-color: rgba(0,229,160,.6); }
.card-hdr { padding: 13px 14px; cursor: pointer; display: flex; align-items: flex-start; gap: 8px; }
.num { font-size: 11px; color: var(--muted); font-weight: 700; flex-shrink: 0; padding-top: 2px; min-width: 22px; }
.ttl { flex: 1; font-size: 14px; font-weight: 600; line-height: 1.45; color: var(--text); word-break: break-all; overflow-wrap: anywhere; }
.card-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; padding-top: 2px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.card.partial .dot { background: var(--warn); }
.card.done    .dot { background: var(--done); }
.chev { font-size: 16px; color: var(--muted); transition: transform .2s; }
.card.open .chev { transform: rotate(180deg); }

.pv { display: none; padding: 0 14px 12px; font-size: 13px; color: var(--muted); }
.pv.show { display: block; }
.pv-text { color: var(--text); margin-bottom: 3px; word-break: break-all; }
.pv-photo { color: var(--done); }

.card-body { display: none; border-top: 1px solid var(--border); padding: 14px; }
.card.open .card-body { display: block; }
.card.open .pv { display: none !important; }

.sub-lbl { font-size: 12px; color: var(--muted); font-weight: 700; margin-bottom: 8px; margin-top: 16px; }
.sub-lbl:first-child { margin-top: 0; }

textarea { width: 100%; background: var(--card2); border: 2px solid var(--border); border-radius: 12px; padding: 13px; line-height: 1.6; color: var(--text); font-family: inherit; resize: none; min-height: 100px; display: block; }
textarea:focus { border-color: var(--accent); outline: none; }

/* 写真 */
.photo-slots { display: flex; flex-direction: column; gap: 10px; }
.photo-slot { background: var(--card2); border: 2px solid var(--border); border-radius: 12px; overflow: hidden; }
.photo-slot.filled    { border-color: rgba(0,229,160,.5); }
.photo-slot.uploading { border-color: rgba(0,200,255,.5); }
.slot-label { font-size: 12px; color: var(--muted); font-weight: 700; padding: 10px 12px 0; }
.slot-btns { display: flex; gap: 8px; padding: 8px 12px 12px; }
.slot-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 13px 8px; border-radius: 10px; font-weight: 700; border: 2px solid var(--border); background: var(--card); color: var(--muted); }
.slot-btn.cam { border-color: rgba(0,200,255,.5); color: var(--accent); }
.slot-btn.lib { border-color: rgba(124,58,237,.5); color: #a78bfa; }
input[type=file] { display: none; }
.slot-uploading-body { display: flex; align-items: center; gap: 10px; padding: 14px 12px; }
.slot-spin { width: 20px; height: 20px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.slot-uploading-msg { font-size: 13px; color: var(--accent); font-weight: 600; }
.slot-preview { position: relative; }
.slot-img { width: 100%; object-fit: cover; max-height: 170px; display: block; }
.slot-badge { position: absolute; top: 6px; left: 6px; background: rgba(0,229,160,.9); color: #000; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 16px; }
.slot-overlay { display: flex; }
.slot-retake-cam, .slot-retake-lib { flex: 1; padding: 11px 6px; font-weight: 700; border: none; display: flex; align-items: center; justify-content: center; gap: 4px; }
.slot-retake-cam { background: rgba(0,0,0,.75); color: var(--accent); }
.slot-retake-lib { background: rgba(0,0,0,.75); color: #a78bfa; border-left: 1px solid rgba(255,255,255,.1); }
.slot-del { padding: 11px 14px; background: rgba(255,107,107,.25); color: var(--err); border: none; border-left: 1px solid rgba(255,255,255,.1); }

/* フッター */
.footer { flex-shrink: 0; background: var(--card); border-top: 2px solid var(--border); display: flex; gap: 10px; padding: 10px 14px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
.btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 15px 8px; border-radius: 14px; font-weight: 700; border: none; }
.btn-draft { background: var(--card2); color: var(--accent); border: 2px solid rgba(0,200,255,.4); }
.btn-done  { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; }

.toast { position: fixed; top: 80px; left: 50%; z-index: 300; transform: translateX(-50%) translateY(-6px); background: #1a1a28; color: var(--done); border: 1px solid rgba(0,229,160,.3); padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 700; white-space: nowrap; pointer-events: none; opacity: 0; transition: all .25s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err  { color: var(--err); border-color: rgba(255,107,107,.3); }
.overlay { display: none; position: fixed; inset: 0; background: rgba(13,13,20,.9); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 18px; }
.overlay.show { display: flex; }
.spin { width: 44px; height: 44px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .75s linear infinite; }
.overlay p { font-size: 15px; color: var(--muted); }
.init-load { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 40vh; gap: 16px; }
.init-load p { font-size: 15px; color: var(--muted); }
</style>
</head>
<body>

<div id="s-top" class="screen active">
  <div class="top-logo">◈ POSTING SURVEY</div>
  <div class="top-title">競合調査フォーム</div>
  <div class="top-sub">新規調査を開始するか、途中保存を再開してください</div>
  <button class="top-btn new" onclick="goCompany()">
    <span class="btn-icon">📋</span>
    <div class="btn-text">新規調査を開始<small>会社名を入力して開始</small></div>
    <span>›</span>
  </button>
  <div id="draft-section" style="display:none">
    <div class="section-label">途中保存データ</div>
    <div class="draft-list" id="draft-list"></div>
  </div>
</div>

<div id="s-company" class="screen">
  <button class="back-btn" onclick="goTop()">‹ 戻る</button>
  <div class="sc-title">会社名を入力</div>
  <div class="sc-sub">調査対象の会社名を入力してください</div>
  <input class="sc-input" id="company-input" type="text" placeholder="例）○○ポスティング" autocomplete="off">
  <button class="sc-btn" onclick="startNew()">調査を開始 →</button>
</div>

<div id="s-form" class="screen">
  <div class="hdr">
    <div class="hdr-row">
      <span class="hdr-company" id="hdr-company"></span>
      <span class="prog-label" id="prog-label">- / -</span>
    </div>
    <div class="prog-track"><div class="prog-bar" id="prog-bar"></div></div>
  </div>
  <div class="list-wrap">
    <div class="list" id="list">
      <div class="init-load"><div class="spin"></div><p>確認項目を読み込み中…</p></div>
    </div>
  </div>
  <div class="footer">
    <button class="btn btn-draft" onclick="onDraft()">💾 途中保存</button>
    <button class="btn btn-done"  onclick="onComplete()">✓ 完了・保存</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay"><div class="spin"></div><p id="overlay-msg">保存中…</p></div>

<script>
var GAS_URL    = 'https://script.google.com/a/macros/postech.co.jp/s/AKfycbzF1dr4p5BaxnlfEcTglRSB-0guazzhzAvW-b0-9AwOrewWMNsiR79ImTIn0nFixdPwHg/exec';
var ITEMS      = [];
var state      = {};
var company    = '';
var MAX_PHOTOS = 3;

// GAS APIを叩く関数
function gasGet(params) {
  var url = GAS_URL + '?' + Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  return fetch(url).then(function(r) { return r.json(); });
}
function gasPost(data) {
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); });
}

window.addEventListener('load', function () {
  gasGet({ action: 'getItems' }).then(function(r) {
    if (!r.success) { alert('項目読み込みエラー: ' + r.error); return; }
    ITEMS = r.items;
  }).catch(function(e) { alert('エラー: ' + e.message); });
  loadDraftList();
});

function loadDraftList() {
  gasGet({ action: 'getDraftList' }).then(function(r) {
    if (!r.success || r.drafts.length === 0) return;
    var sec = document.getElementById('draft-section');
    var lst = document.getElementById('draft-list');
    sec.style.display = 'block';
    lst.innerHTML = '';
    r.drafts.forEach(function(d) {
      var div = document.createElement('div');
      div.className = 'draft-item';
      div.innerHTML =
        '<span class="draft-icon">📝</span>' +
        '<div class="draft-info">' +
          '<div class="draft-company">' + eh(d.company) + '</div>' +
          '<div class="draft-date">' + eh(d.savedAt) + (d.hasPhoto ? '　📷あり' : '') + '</div>' +
        '</div>' +
        '<button class="draft-delete" onclick="delDraft(\'' + esc(d.company) + '\',event)">✕</button>';
      div.querySelector('.draft-info').addEventListener('click', function() { resumeDraft(d.company); });
      lst.appendChild(div);
    });
  }).catch(function() {});
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function goTop()     { showScreen('s-top'); }
function goCompany() { showScreen('s-company'); }

function startNew() {
  var val = document.getElementById('company-input').value.trim();
  if (!val) { toast('⚠️ 会社名を入力してください', true); return; }
  if (ITEMS.length === 0) { toast('⚠️ 項目を読み込み中です…', true); return; }
  company = val; state = {};
  renderForm(); showScreen('s-form');
}

function resumeDraft(co) {
  if (ITEMS.length === 0) { toast('⚠️ 項目を読み込み中です…', true); return; }
  showOv('データを読み込み中…');
  gasGet({ action: 'getDraftData', company: co }).then(function(r) {
    hideOv();
    if (!r.success) { toast('⚠️ ' + r.error, true); return; }
    company = co; state = {};
    var saved = r.state;
    Object.keys(saved).forEach(function(no) {
      var idx = parseInt(no) - 1;
      var d   = saved[no];
      state[idx] = {
        text:   d.text || '',
        photos: (d.photos || []).map(function(p) {
          return { url: p.url || '', fileName: p.fileName || '', dataUrl: p.url || '' };
        })
      };
    });
    renderForm(); showScreen('s-form');
  }).catch(function(e) { hideOv(); toast('⚠️ ' + e.message, true); });
}

function delDraft(co, e) {
  e.stopPropagation();
  if (!confirm(co + ' の途中保存を削除しますか？')) return;
  showOv('削除中…');
  gasPost({ action: 'deleteDraft', company: co }).then(function() {
    hideOv(); toast('🗑 削除しました'); loadDraftList();
  }).catch(function(e) { hideOv(); toast('⚠️ ' + e.message, true); });
}

function renderForm() {
  document.getElementById('hdr-company').textContent = company;
  var el = document.getElementById('list');
  el.innerHTML = '';
  ITEMS.forEach(function(item, i) {
    var div = document.createElement('div');
    div.className = 'card';
    div.id = 'c' + i;
    var s = state[i] || {};
    div.innerHTML =
      '<div class="card-hdr" onclick="tog(' + i + ')">' +
        '<span class="num">' + pad(i+1) + '</span>' +
        '<span class="ttl">' + eh(item) + '</span>' +
        '<div class="card-right"><span class="dot"></span><span class="chev">⌄</span></div>' +
      '</div>' +
      '<div class="pv" id="pv' + i + '"></div>' +
      '<div class="card-body">' +
        '<div class="sub-lbl">テキスト回答</div>' +
        '<textarea id="ta' + i + '" placeholder="回答を入力…" oninput="ot(' + i + ')" rows="4"></textarea>' +
        '<div class="sub-lbl">写真（最大3枚）</div>' +
        '<div class="photo-slots" id="slots' + i + '"></div>' +
      '</div>';
    el.appendChild(div);
    if (s.text) document.getElementById('ta' + i).value = s.text;
    renderSlots(i);
    rc(i, true);
  });
  updProg();
}

function tog(i) {
  var card = document.getElementById('c' + i);
  var wasOpen = card.classList.contains('open');
  document.querySelectorAll('.card.open').forEach(function(c) { c.classList.remove('open'); });
  if (!wasOpen) {
    card.classList.add('open');
    setTimeout(function() { card.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
  }
}

function ot(i) {
  if (!state[i]) state[i] = {};
  state[i].text = document.getElementById('ta' + i).value;
  rc(i);
}

function renderSlots(i) {
  var photos = (state[i] && state[i].photos) || [];
  var wrap   = document.getElementById('slots' + i);
  if (!wrap) return;
  wrap.innerHTML = '';
  photos.forEach(function(p, j) { wrap.appendChild(makeFilledSlot(i, j, p)); });
  if (photos.length < MAX_PHOTOS) wrap.appendChild(makeEmptySlot(i, photos.length));
}

function makeEmptySlot(i, j) {
  var div = document.createElement('div');
  div.className = 'photo-slot';
  div.id = 'slot' + i + '_' + j;
  div.innerHTML =
    '<div class="slot-label">写真 ' + (j+1) + '</div>' +
    '<div class="slot-btns">' +
      '<button class="slot-btn cam" onclick="trigCam(' + i + ',' + j + ')">📷 カメラ</button>' +
      '<button class="slot-btn lib" onclick="trigLib(' + i + ',' + j + ')">🖼 ライブラリ</button>' +
    '</div>' +
    '<input type="file" id="cam' + i + '_' + j + '" accept="image/*" capture="environment" onchange="onPhoto(' + i + ',' + j + ',this)">' +
    '<input type="file" id="lib' + i + '_' + j + '" accept="image/*" onchange="onPhoto(' + i + ',' + j + ',this)">';
  return div;
}

function makeUploadingSlot(i, j) {
  var div = document.createElement('div');
  div.className = 'photo-slot uploading';
  div.id = 'slot' + i + '_' + j;
  div.innerHTML = '<div class="slot-label">写真 ' + (j+1) + '</div><div class="slot-uploading-body"><div class="slot-spin"></div><div class="slot-uploading-msg">アップロード中…</div></div>';
  return div;
}

function makeFilledSlot(i, j, p) {
  var div = document.createElement('div');
  div.className = 'photo-slot filled';
  div.id = 'slot' + i + '_' + j;
  var src = p.dataUrl || p.url || '';
  div.innerHTML =
    '<div class="slot-label">写真 ' + (j+1) + '</div>' +
    '<div class="slot-preview">' +
      '<img class="slot-img" src="' + src + '" alt="">' +
      '<div class="slot-badge">✅</div>' +
      '<div class="slot-overlay">' +
        '<button class="slot-retake-cam" onclick="trigCam(' + i + ',' + j + ')">📷</button>' +
        '<button class="slot-retake-lib" onclick="trigLib(' + i + ',' + j + ')">🖼</button>' +
        '<button class="slot-del" onclick="delPhoto(' + i + ',' + j + ')">✕</button>' +
      '</div>' +
    '</div>' +
    '<input type="file" id="cam' + i + '_' + j + '" accept="image/*" capture="environment" onchange="onPhoto(' + i + ',' + j + ',this)">' +
    '<input type="file" id="lib' + i + '_' + j + '" accept="image/*" onchange="onPhoto(' + i + ',' + j + ',this)">';
  return div;
}

function trigCam(i, j) { document.getElementById('cam' + i + '_' + j).click(); }
function trigLib(i, j) { document.getElementById('lib' + i + '_' + j).click(); }

function onPhoto(i, j, input) {
  var file = input.files[0];
  if (!file) return;
  var wrap = document.getElementById('slots' + i);
  var old  = document.getElementById('slot' + i + '_' + j);
  if (old) wrap.replaceChild(makeUploadingSlot(i, j), old);

  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    gasPost({
      action: 'uploadPhoto',
      company: company, itemNo: i+1, photoIndex: j+1,
      base64: dataUrl.split(',')[1] || '',
      mime: file.type || 'image/jpeg',
      ext: (file.name.split('.').pop() || 'jpg').toLowerCase()
    }).then(function(r) {
      if (!state[i]) state[i] = {};
      if (!state[i].photos) state[i].photos = [];
      if (r.success) {
        state[i].photos[j] = { dataUrl: dataUrl, url: r.url, fileName: r.fileName };
        toast('📷 アップロード完了');
      } else {
        state[i].photos[j] = { dataUrl: dataUrl, url: '', fileName: '' };
        toast('⚠️ ' + r.error, true);
      }
      renderSlots(i); rc(i);
    }).catch(function() {
      if (!state[i]) state[i] = {};
      if (!state[i].photos) state[i].photos = [];
      state[i].photos[j] = { dataUrl: dataUrl, url: '', fileName: '' };
      toast('⚠️ アップロード失敗', true);
      renderSlots(i); rc(i);
    });
  };
  reader.readAsDataURL(file);
}

function delPhoto(i, j) {
  if (!state[i] || !state[i].photos) return;
  state[i].photos.splice(j, 1);
  renderSlots(i); rc(i);
}

function sc(i) {
  var s = state[i] || {};
  var t = s.text && s.text.trim();
  var p = s.photos && s.photos.length > 0;
  return t && p ? 'done' : (t || p) ? 'partial' : '';
}

function rc(i, silent) {
  var card = document.getElementById('c' + i);
  if (!card) return;
  card.classList.remove('done', 'partial');
  var cls = sc(i);
  if (cls) card.classList.add(cls);
  var s   = state[i] || {};
  var pv  = document.getElementById('pv' + i);
  var html = '';
  if (s.text && s.text.trim()) {
    var short = s.text.length > 28 ? s.text.slice(0, 28) + '…' : s.text;
    html += '<div class="pv-text">' + eh(short) + '</div>';
  }
  if (s.photos && s.photos.length > 0) html += '<div class="pv-photo">📷 ' + s.photos.length + '枚</div>';
  pv.innerHTML = html;
  html ? pv.classList.add('show') : pv.classList.remove('show');
  if (!silent) updProg();
}

function updProg() {
  var n = ITEMS.reduce(function(a, _, i) { return a + (sc(i) ? 1 : 0); }, 0);
  var pct = ITEMS.length ? Math.round(n / ITEMS.length * 100) : 0;
  document.getElementById('prog-bar').style.width   = pct + '%';
  document.getElementById('prog-label').textContent = n + ' / ' + ITEMS.length;
}

function buildItems() {
  return ITEMS.map(function(item, i) {
    var s = state[i] || {};
    return { no: i+1, item: item, text: s.text||'', photos: (s.photos||[]).map(function(p){ return { url: p.url||'', fileName: p.fileName||'' }; }) };
  });
}

function onDraft() {
  showOv('途中保存中…');
  gasPost({ action: 'saveDraft', company: company, savedAt: new Date().toISOString(), items: buildItems() })
    .then(function(r) { hideOv(); r.success ? toast('💾 途中保存しました') : toast('⚠️ ' + r.error, true); })
    .catch(function(e) { hideOv(); toast('⚠️ ' + e.message, true); });
}

function onComplete() {
  var any = ITEMS.some(function(_, i) {
    var s = state[i] || {};
    return (s.text && s.text.trim()) || (s.photos && s.photos.length > 0);
  });
  if (!any) { toast('⚠️ 少なくとも1項目を入力してください', true); return; }
  showOv('保存中…');
  gasPost({ action: 'saveComplete', company: company, savedAt: new Date().toISOString(), items: buildItems() })
    .then(function(r) {
      hideOv();
      if (r.success) { toast('✅ 保存完了！'); setTimeout(function() { goTop(); loadDraftList(); }, 1500); }
      else { toast('⚠️ ' + r.error, true); }
    })
    .catch(function(e) { hideOv(); toast('⚠️ ' + e.message, true); });
}

function showOv(msg) { document.getElementById('overlay-msg').textContent = msg; document.getElementById('overlay').classList.add('show'); }
function hideOv()    { document.getElementById('overlay').classList.remove('show'); }
function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (isErr ? ' err' : '');
  t.classList.add('show'); clearTimeout(t._tid);
  t._tid = setTimeout(function() { t.classList.remove('show'); }, 2200);
}
function pad(n) { return (n < 10 ? '0' : '') + n; }
function eh(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function esc(s) { return String(s).replace(/'/g, "&#39;"); }
</script>
